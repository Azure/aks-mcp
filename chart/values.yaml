# Default values for aks-mcp.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/azure/aks-mcp
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Application configuration
app:
  # Transport mechanism: stdio, sse, streamable-http
  transport: "streamable-http"
  # Port to listen on
  port: 8000
  # Access level: readonly, readwrite, admin
  accessLevel: "readonly"
  # Command execution timeout in seconds
  timeout: 600
  # Enable verbose logging
  verbose: false
  # Enable cache for better performance
  cache: true

# Azure authentication configuration
azure:
  # Use existing secret for Azure credentials
  existingSecret: ""
  # Azure tenant ID (can also be set via secret)
  tenantId: ""
  # Azure client ID (can also be set via secret)
  clientId: ""
  # Azure client secret (can also be set via secret)
  clientSecret: ""
  # Azure subscription ID (can also be set via secret)
  subscriptionId: ""
  
  # Workload Identity configuration
  workloadIdentity:
    enabled: false
    clientId: ""
  
  # Managed Identity configuration
  managedIdentity:
    enabled: false
    # Type: system or user-assigned client ID
    type: "system"

# OAuth configuration
oauth:
  # Enable OAuth authentication
  enabled: false
  # Azure AD tenant ID for OAuth (falls back to azure.tenantId)
  tenantId: ""
  # Azure AD client ID for OAuth (falls back to azure.clientId)
  clientId: ""
  # Custom redirect URIs (auto-generated if empty)
  redirectURIs: []
  # Custom CORS origins (auto-generated if empty)
  corsOrigins: []

# Application configuration
config:
  # Azure resource group
  resourceGroup: ""
  # Additional Kubernetes tools: helm, cilium, hubble
  additionalTools: []
  # Allowed Kubernetes namespaces (empty means all)
  allowNamespaces: []
  # Cache timeout
  cacheTimeout: "60s"

# Kubeconfig configuration
kubeconfig:
  enabled: false
  secretName: "kubeconfig"

# Telemetry configuration
telemetry:
  # OTLP endpoint for OpenTelemetry traces
  otlpEndpoint: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# RBAC settings
rbac:
  # Specifies whether RBAC resources should be created
  create: true

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  capabilities:
    drop:
    - ALL

service:
  type: ClusterIP
  port: 8000
  nodePort: ""
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
extraVolumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
extraVolumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

# Additional environment variables
extraEnv: []
# - name: MY_ENV_VAR
#   value: "my-value"

nodeSelector: {}

tolerations: []

affinity: {}